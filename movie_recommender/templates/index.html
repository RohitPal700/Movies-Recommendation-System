<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Recommender</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1e1e2f;
            color: white;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: auto;
            text-align: center;
            padding-top: 50px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 32px;
        }

        select {
            padding: 10px;
            width: 70%;
            max-width: 400px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background: #4b7bec;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #3867d6;
        }

        .poster-box {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            flex-wrap: wrap;
        }

        .poster {
            width: 160px;
            text-align: center;
        }

        .poster img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-radius: 12px;
            transition: 0.3s ease;
        }

        .poster img:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        p {
            margin-top: 8px;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Movie Recommender</h1>

    <form method="POST">
        <select name="movie_name">
            {% for movie in movie_list %}
                <option value="{{ movie }}"
                    {% if movie == selected_movie %} selected {% endif %}
                >{{ movie }}</option>
            {% endfor %}
        </select>

        <button type="submit">Recommend</button>
    </form>

    {% if recommended_movies %}
        <h2 style="margin-top: 30px;">Recommendations for {{ selected_movie }}:</h2>

        <div class="poster-box">
            {% for name in recommended_movies %}
                <div class="poster">
                    <img src="{{ posters[loop.index0] }}" alt="{{ name }}">
                    <p>{{ name }}</p>
                </div>
            {% endfor %}
        </div>
    {% endif %}
</div>

</body>
</html>
